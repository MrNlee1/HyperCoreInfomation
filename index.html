<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:black;
    font-family:Arial;
    max-width:500px;
    margin:auto;
}

/* MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

/* LAYOUT FIX */
.wrap{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column; /* FIX CHÍNH */
    justify-content:center;
    align-items:center;
    min-height:100vh;
    gap:20px;
    padding:20px;
}

/* CARD */
.card-wrap{perspective:1200px;}

.card{
    width:100%;
    max-width:360px; /* FIX */
    aspect-ratio:16/10;
    transform-style:preserve-3d;
    transition:0.7s;
    position:relative;
}

.card.flip{transform:rotateY(180deg);}

.face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:18px;
    padding:20px;
    color:white;
    backface-visibility:hidden;
}

/* FRONT */
.front{
    background:linear-gradient(135deg,#1e40af,#3b82f6,#0ea5e9);
    box-shadow:0 20px 80px rgba(59,130,246,.6);
}

/* BACK */
.back{
    background:#111;
    transform:rotateY(180deg);
}

/* TEXT */
.brand{
    position:absolute;
    top:15px;
    right:20px;
    font-weight:bold;
}
.tier{
    font-size:12px;
    opacity:0.8;
}
.num{
    margin-top:60px;
    font-size:18px;
    letter-spacing:2px;
}
.exp{
    margin-top:20px;
}

/* FORM */
.box{
    background:rgba(2,6,23,.95);
    padding:20px;
    border-radius:16px;
    width:100%;
    max-width:320px; /* FIX */
    box-shadow:0 0 40px rgba(59,130,246,.5);
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.2);
    background:#020617;
    color:white;
    font-size:16px; /* FIX chống zoom iOS */
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
}

/* COUNT */
.count{
    text-align:center;
    font-size:40px;
    margin-top:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="wrap">

<!-- CARD -->
<div class="card-wrap">
<div class="card" id="card">

<div class="face front">
    <div class="tier">WORLD ELITE</div>
    <div class="brand" id="brand">CARD</div>
    <div class="num" id="num">•••• •••• •••• ••••</div>
    <div class="exp" id="expv">MM/YY</div>
</div>

<div class="face back">
    <div style="margin-top:80px;text-align:center;">CVC</div>
</div>

</div>
</div>

<!-- FORM -->
<form class="box" autocomplete="on">

    <h3 style="color:white;">Secure Checkout</h3>

    <input name="cardnumber" autocomplete="cc-number" inputmode="numeric" placeholder="Card Number">
    <input name="exp" autocomplete="cc-exp" placeholder="MM/YY">
    <input name="cvc" autocomplete="cc-csc" placeholder="CVC">

    <button type="submit">Pay</button>

    <div class="count" id="count"></div>

</form>

</div>

<script>
// MATRIX FIX
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let letters="0123456789";
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#3b82f6";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.random()*letters.length|0];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,40);

// INPUT
let numInput=document.querySelector("[name=cardnumber]");
let expInput=document.querySelector("[name=exp]");
let cvcInput=document.querySelector("[name=cvc]");

numInput.addEventListener("input",e=>{
    let v=e.target.value.replace(/\D/g,'').substring(0,16);
    e.target.value=v.replace(/(.{4})/g,'$1 ').trim();
    document.getElementById("num").innerText=e.target.value||"•••• •••• •••• ••••";

    let brand="CARD";
    if(v.startsWith("4")) brand="VISA";
    else if(v.startsWith("5")) brand="MASTERCARD";

    document.getElementById("brand").innerText=brand;
});

expInput.addEventListener("input",e=>{
    let v=e.target.value.replace(/\D/g,'').substring(0,4);
    if(v.length>=3) v=v.substring(0,2)+"/"+v.substring(2);
    e.target.value=v;
    document.getElementById("expv").innerText=v||"MM/YY";
});

cvcInput.addEventListener("focus",()=>card.classList.add("flip"));
cvcInput.addEventListener("blur",()=>card.classList.remove("flip"));

// SUBMIT giữ Google save
document.querySelector("form").addEventListener("submit",(e)=>{
    setTimeout(()=>{
        e.preventDefault();
        let c=document.getElementById("count");
        let i=3;
        c.innerText=i;
        let t=setInterval(()=>{
            i--;
            if(i==0){
                c.innerText="✔";
                clearInterval(t);
            }else c.innerText=i;
        },1000);
    },150);
});
</script>

</body>
</html>
