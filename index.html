<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Information</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:black;
    font-family:Arial;
}

/* MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

/* WRAP */
.wrap{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* BOX */
.box{
    width:100%;
    max-width:360px;
    background:rgba(2,6,23,.95);
    padding:25px;
    border-radius:16px;
    box-shadow:0 0 40px rgba(59,130,246,.5);
    text-align:center;
}

/* HEADER */
h3{
    color:white;
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.2);
    background:#020617;
    color:white;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
}

/* COUNT */
.count{
    font-size:40px;
    margin-top:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="wrap">

<form class="box" autocomplete="on">

    <!-- TITLE -->
    <h3>Secure Payment</h3>

    <!-- INPUT -->
    <input id="card" name="cardnumber" autocomplete="cc-number" placeholder="Card Number">

    <input id="exp" name="exp" autocomplete="cc-exp" placeholder="MM/YY">

    <input id="cvc" name="cvc" autocomplete="cc-csc" placeholder="CVC">

    <!-- BUTTON -->
    <button type="submit">Pay</button>

    <div class="count" id="count"></div>

</form>

</div>

<script>
// MATRIX
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let letters="0123456789";
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#3b82f6";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.random()*letters.length|0];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,40);

// INPUT + AUTO NEXT
let card=document.getElementById("card");
let exp=document.getElementById("exp");
let cvc=document.getElementById("cvc");

card.addEventListener("input",e=>{
    let v=e.target.value.replace(/\D/g,'').substring(0,16);
    e.target.value=v.replace(/(.{4})/g,'$1 ').trim();

    if(v.length===16){
        exp.focus();
    }
});

exp.addEventListener("input",e=>{
    let v=e.target.value.replace(/\D/g,'').substring(0,4);
    if(v.length>=3){
        v=v.substring(0,2)+"/"+v.substring(2);
    }
    e.target.value=v;

    if(v.length===5){
        cvc.focus();
    }
});

cvc.addEventListener("input",e=>{
    let v=e.target.value.replace(/\D/g,'').substring(0,3);
    e.target.value=v;
});

// SUBMIT
document.querySelector("form").addEventListener("submit",(e)=>{
    setTimeout(()=>{
        e.preventDefault();

        let c=document.getElementById("count");
        let i=3;
        c.innerText=i;

        let t=setInterval(()=>{
            i--;
            if(i==0){
                c.innerText="✔";
                clearInterval(t);
            }else c.innerText=i;
        },1000);
    },150);
});
</script>

</body>
</html>
