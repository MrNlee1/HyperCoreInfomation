<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Information</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

/* 🌈 BACKGROUND MỚI */
body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle at 20% 20%, #1e1b4b, transparent 40%),
              radial-gradient(circle at 80% 80%, #0ea5e9, transparent 40%),
              linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
  overflow:hidden;
}

/* LIGHT EFFECT */
.bg-glow{
  position:fixed;
  width:300px;
  height:300px;
  background:#6366f1;
  filter:blur(120px);
  opacity:0.3;
  top:20%;
  left:20%;
}

.bg-glow2{
  position:fixed;
  width:300px;
  height:300px;
  background:#0ea5e9;
  filter:blur(120px);
  opacity:0.3;
  bottom:10%;
  right:10%;
}

/* WRAP */
.wrap{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* CARD BOX */
.box{
  width:100%;
  max-width:380px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(25px);
  border-radius:20px;
  padding:25px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* TITLE */
h3{
  margin-bottom:20px;
  font-weight:600;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:12px 0;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.2);
  background:#020617;
  color:white;
  font-size:16px;
  transition:0.2s;
}

input:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 2px rgba(99,102,241,0.3);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#6366f1,#0ea5e9);
  color:white;
  font-weight:600;
  margin-top:10px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

/* COUNT */
.count{
  text-align:center;
  font-size:30px;
  margin-top:15px;
  color:#22c55e;
}
</style>
</head>

<body>

<!-- GLOW EFFECT -->
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="wrap">

<form class="box" autocomplete="on">

  <h3>Secure Payment</h3>

  <input id="card" name="cardnumber" autocomplete="cc-number" inputmode="numeric" placeholder="Card number">

  <input id="exp" name="exp" autocomplete="cc-exp" placeholder="MM / YY">

  <input id="cvc" name="cvc" autocomplete="cc-csc" placeholder="CVC">

  <button type="submit">Pay</button>

  <div class="count" id="count"></div>

</form>

</div>

<script>
// INPUT LOGIC GIỮ NGUYÊN
let card=document.getElementById("card");
let exp=document.getElementById("exp");
let cvc=document.getElementById("cvc");

card.addEventListener("input",e=>{
  let v=e.target.value.replace(/\D/g,'').substring(0,16);
  e.target.value=v.replace(/(.{4})/g,'$1 ').trim();

  if(v.length===16){
    exp.focus();
  }
});

exp.addEventListener("input",e=>{
  let v=e.target.value.replace(/\D/g,'').substring(0,4);
  if(v.length>=3){
    v=v.substring(0,2)+"/"+v.substring(2);
  }
  e.target.value=v;

  if(v.length===5){
    cvc.focus();
  }
});

cvc.addEventListener("input",e=>{
  let v=e.target.value.replace(/\D/g,'').substring(0,3);
  e.target.value=v;
});

// SUBMIT (GIỮ SAVE CARD)
document.querySelector("form").addEventListener("submit",(e)=>{
  setTimeout(()=>{
    e.preventDefault();

    let c=document.getElementById("count");
    let i=3;
    c.innerText=i;

    let t=setInterval(()=>{
      i--;
      if(i==0){
        c.innerText="✔ Done";
        clearInterval(t);
      }else{
        c.innerText=i;
      }
    },1000);
  },150);
});
</script>

</body>
</html>
